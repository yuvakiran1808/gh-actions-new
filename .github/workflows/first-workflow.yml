name: Test project

on: push

jobs: 
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6   #you can also install the required libraries here
      - name: Install NodeJs 
        uses: actions/setup-node@v6
        with:
          node-verison: 24
      - name: Install Dependencies
        run: npm ci
      - name: Run Tests
        run: npm test

